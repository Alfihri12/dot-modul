# Hyprland keybinds configuration
# See https://wiki.hypr.land/Configuring/Binds/

# ############ VARIABLES #############
$mainMod = SUPER
$shiftMod = SUPER_SHIFT
$altMod = SUPER_ALT

$terminal = kitty
$fileManager = thunar
$menu = fuzzel || pkill fuzzel
$browser = google-chrome-stable
$editor = code
$notes = obsidian
$clipboard = kitty cliphist list
$screenshot = grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%s).png

# ############ APPS #############
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, W, exec, $browser
bind = $mainMod, C, exec, $editor
bind = $mainMod, B, exec, $notes
bind = $mainMod, PRINT, exec, $screenshot
bind = $mainMod, V, exec, $clipboard

# ############ WINDOW CONTROL #############
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen, 1
bind = $shiftMod, F, fullscreen, 0

bind = $mainMod, SPACE, togglefloating,
bind = $shiftMod, SPACE, centerwindow,

bind = $mainMod, TAB, workspace, previous

# focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, J, movefocus, u
bind = $mainMod, K, movefocus, d

# move window (INI YANG LU KURANG)
bind = $shiftMod, H, movewindow, l
bind = $shiftMod, L, movewindow, r
bind = $shiftMod, J, movewindow, u
bind = $shiftMod, K, movewindow, d

# layout
bind = $mainMod, P, pseudo,
bind = $mainMod, O, layoutmsg, togglesplit
bind = $mainMod, I, togglefloating,

# special workspace
bind = $mainMod, S, togglespecialworkspace, magic
bind = $shiftMod, S, movetoworkspace, special:magic

# ############ WORKSPACES #############

# switch
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# move to workspace
bind = $altMod, 1, movetoworkspace, 1
bind = $altMod, 2, movetoworkspace, 2
bind = $altMod, 3, movetoworkspace, 3
bind = $altMod, 4, movetoworkspace, 4
bind = $altMod, 5, movetoworkspace, 5
bind = $altMod, 6, movetoworkspace, 6
bind = $altMod, 7, movetoworkspace, 7
bind = $altMod, 8, movetoworkspace, 8
bind = $altMod, 9, movetoworkspace, 9
bind = $altMod, 0, movetoworkspace, 10

# scroll workspace
bind = $mainMod, mouse_down, workspace, r+1
bind = $mainMod, mouse_up, workspace, r-1

# scroll move window
bind = $altMod, mouse_down, movetoworkspace, r+1
bind = $altMod, mouse_up, movetoworkspace, r-1

# scroll workspace
bind = $mainMod, right, workspace, r+1
bind = $mainMod, left, workspace, r-1

# scroll move window
bind = $altMod, right, movetoworkspace, r+1
bind = $altMod, left, movetoworkspace, r-1

# ############ MOUSE #############
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ############ RESIZE MODE #############
bind = $mainMod, RCTRL, submap, resize

submap = resize
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10
bind = , escape, submap, reset
submap = reset

# ############ SYSTEM / SCRIPTS #############
bind = $shiftMod, M, exec, ~/.config/hypr/scripts/restart/selector.sh
bind = $shiftMod, N, exec, ~/.config/hypr/scripts/wal-all.sh
bind = $mainMod, U, exec, hyprlock

# ############ MEDIA KEYS #############
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous