# Hyprland keybinds configuration
# See https://wiki.hypr.land/Configuring/Binds/

# ############ KEYBINDINGS #############

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = fuzzel
$browser = google-chrome-stable
$editor = code
$clipboard = kitty cliphist list
$screenshot = grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%s).png

# key = modifier
$mainMod = SUPER                # windows key

# Binds are defined in the format: bind = <modifiers>, <key>, <action>, <arguments>
# application actions
bind = $mainMod, R, exec, $menu
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, W, exec, $browser
bind = $mainMod, C, exec, $editor
bind = , PRINT, exec, $screenshot
bind = $mainMod, V, exec, $clipboard

# window management actions
bind = $mainMod, Q, killactive,

# window layout actions
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, O, layoutmsg, togglesplit # dwindle
bind = $mainMod, I, togglefloating,
# A spesial workspace example
bind = $mainMod, S, togglespecialworkspace, magic
bind = SUPER_SHIFT, S, movetoworkspace, special:magic
bind = SUPER_SHIFT, D, movetoworkspace, +0

# Example reload and exit binds
#bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = SUPER_SHIFT, M, exec, ~/.config/hypr/scripts/restart/selector.sh
bind = SUPER_SHIFT, N, exec, ~/.config/hypr/scripts/wal-all.sh

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, J, movefocus, u
bind = $mainMod, K, movefocus, d

# Window Resizing
bind = ALT, R, submap, resize
submap = resize

binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10

bind = , escape, submap, reset
submap = reset


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + alt + [0-9]
bind = $mainMod ALT, 1, movetoworkspace, 1
bind = $mainMod ALT, 2, movetoworkspace, 2
bind = $mainMod ALT, 3, movetoworkspace, 3
bind = $mainMod ALT, 4, movetoworkspace, 4
bind = $mainMod ALT, 5, movetoworkspace, 5
bind = $mainMod ALT, 6, movetoworkspace, 6
bind = $mainMod ALT, 7, movetoworkspace, 7
bind = $mainMod ALT, 8, movetoworkspace, 8
bind = $mainMod ALT, 9, movetoworkspace, 9
bind = $mainMod ALT, 0, movetoworkspace, 10

# Scroll workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, r+1
bind = $mainMod, mouse_up, workspace, r-1

# Scroll windows with mainMod + alt + scroll
bind = $mainMod ALT, mouse_down, movetoworkspace, r+1
bind = $mainMod ALT, mouse_up, movetoworkspace, r-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

