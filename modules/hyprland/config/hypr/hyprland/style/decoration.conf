# https://wiki.hypr.land/Configuring/Variables/


# ############ LOOK AND FEEL #############

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 4
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.2

    shadow {
        enabled = true
        ignore_window = true
        range = 6
        offset = 0 4
        render_power = 10
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
      blur {
        enabled = true
        xray = true
        special = false
        new_optimizations = true
        size = 8
        passes = 3
        brightness = 1
        noise = 0.05
        contrast = 0.89
        vibrancy = 0.5
        vibrancy_darkness = 0.5
        popups = false
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
    }
}
