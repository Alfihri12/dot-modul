general {
    hide_cursor = true
}

background {
    monitor =
    path = ~/Pictures/Wallpapers/wuwa.jpg
    blur_passes = 2
    blur_size = 6
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(255, 255, 255, 1.0)
    font_size = 80
    position = 0, 100
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255,255,255,0.2)
    inner_color = rgba(0,0,0,0.2)
    font_color = rgba(255,255,255,1)
    position = 0, -100
    halign = center
    valign = center
}



